<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#111111">
<title>Capocanale – Banco</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--v:#7A9080;--bx:#8C1515;--az:#E8EFF2}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#111;min-height:100vh;color:#fff}
.app{max-width:600px;margin:0 auto;padding-bottom:2rem}
.topbar{background:#1a1a1a;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid #333}
.brand{font-size:16px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.03em}
.partner-name{font-size:12px;background:var(--v);color:#fff;padding:3px 10px;border-radius:999px;font-weight:500}
.sync-btn{padding:5px 12px;font-size:12px;font-weight:500;background:rgba(255,255,255,.1);color:#fff;border:0.5px solid rgba(255,255,255,.2);border-radius:6px;cursor:pointer}
.queue-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#222;border-bottom:0.5px solid #333}
.queue-count{font-size:13px;color:#aaa}
.queue-badge{background:var(--bx);color:#fff;font-size:12px;font-weight:700;padding:3px 10px;border-radius:999px}
.order-card{margin:10px 12px;background:#1a1a1a;border-radius:12px;overflow:hidden;border:1px solid #2a2a2a}
.order-card.new{border-color:var(--v)}
.oc-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:#222}
.oc-name{font-size:15px;font-weight:600;color:#fff}
.oc-code{font-size:13px;font-family:monospace;background:#333;color:#aaa;padding:3px 8px;border-radius:4px}
.oc-time{font-size:11px;color:#666;margin-top:2px}
.oc-body{padding:10px 14px}
.oc-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid #2a2a2a}
.oc-item:last-child{border-bottom:none}
.oi-info{}
.oi-name{font-size:14px;color:#fff}
.oi-qty{font-size:12px;color:#888;margin-top:2px}
.deliver-btn{padding:7px 14px;background:var(--v);color:#fff;font-size:13px;font-weight:600;border:none;border-radius:7px;cursor:pointer}
.deliver-btn:hover{background:#5E7265}
.deliver-btn.done{background:#2a2a2a;color:#666;cursor:default}
.new-badge{background:var(--v);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px}
.done-badge{background:#2a2a2a;color:#666;font-size:10px;padding:2px 7px;border-radius:999px}
.empty{text-align:center;padding:3rem 1rem;color:#444;font-size:14px;line-height:1.8}
.pin-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center}
.pin-title{font-size:22px;font-weight:700;margin-bottom:6px}
.pin-sub{font-size:14px;color:#888;margin-bottom:2rem}
.pin-display{font-size:36px;font-weight:700;letter-spacing:8px;color:var(--v);margin-bottom:2rem;min-height:48px}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:260px}
.pin-btn{padding:18px;background:#222;border:1px solid #333;border-radius:10px;font-size:20px;font-weight:600;color:#fff;cursor:pointer;text-align:center}
.pin-btn:hover{background:#2a2a2a;border-color:var(--v)}
.pin-err{color:var(--bx);font-size:13px;margin-top:1rem}
.partner-select{max-width:320px;width:100%}
.partner-btn{display:block;width:100%;padding:14px;background:#222;border:1px solid #333;border-radius:10px;color:#fff;font-size:15px;font-weight:600;margin-bottom:10px;cursor:pointer;text-align:center}
.partner-btn:hover{border-color:var(--v);background:#1a2a22}
.logo-img{width:36px;height:36px;border-radius:50%;object-fit:cover;margin-right:8px;vertical-align:middle}
.spin{display:inline-block;width:11px;height:11px;border:1.5px solid #444;border-top-color:var(--v);border-radius:50%;animation:sp .7s linear infinite;margin-right:4px;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
.al{padding:10px 14px;border-radius:8px;font-size:13px;margin:8px 12px}
.al.ok{background:#0f3a20;color:#5dda90;border:1px solid #1a5c33}
.al.er{background:#3a0f0f;color:#e06060;border:1px solid #5c1a1a}
.manual-box{margin:10px 12px;background:#1a1a1a;border-radius:12px;padding:14px;border:1px solid #2a2a2a}
.manual-title{font-size:13px;font-weight:600;color:#aaa;margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em}
.fld label{font-size:12px;color:#888;display:block;margin-bottom:4px}
.fld input,.fld select{width:100%;padding:10px 12px;font-size:14px;border:1px solid #333;border-radius:8px;background:#222;color:#fff;margin-bottom:10px}
.fld input:focus,.fld select:focus{outline:none;border-color:var(--v)}
.qty-ctrl{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.qb{width:32px;height:32px;border-radius:50%;border:1px solid #333;background:#222;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff}
.qb:hover{border-color:var(--v)}
.qn{font-size:16px;font-weight:600;min-width:24px;text-align:center;color:var(--v)}
.tabs{display:flex;border-bottom:1px solid #2a2a2a;margin-bottom:10px}
.tab{flex:1;padding:8px;text-align:center;font-size:12px;color:#666;cursor:pointer;border-bottom:2px solid transparent}
.tab.on{color:#fff;border-bottom-color:var(--v)}
</style>
</head>
<body>
<div class="app" id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const {useState,useEffect,createElement:h}=React;
const SURL='https://script.google.com/macros/s/AKfycbw2iHAd87u0-9Tym7RcxeCnJarEM0dQrABVASVKbDx2AxxsZ5iDSLplVuP1NcevYYvB/exec';
const euro=n=>'€'+Number(n).toFixed(2).replace('.',',');
const api=params=>fetch(SURL+'?'+new URLSearchParams(params)).then(r=>r.json());

function App(){
  const[screen,setScreen]=useState('select'); // select | pin | banco
  const[partners,setPartners]=useState([]);
  const[selPartner,setSelPartner]=useState(null);
  const[pinInput,setPinInput]=useState('');
  const[pinErr,setPinErr]=useState('');
  const[orders,setOrders]=useState([]);
  const[syncing,setSyncing]=useState(false);
  const[alert,setAlert]=useState(null);
  const[tab,setTab]=useState('queue'); // queue | manual

  useEffect(()=>{
    api({action:'getConfig'}).then(d=>{
      if(d.ok) setPartners(d.config.partners||[]);
    });
  },[]);

  useEffect(()=>{
    if(screen==='banco') doSync();
    const iv=screen==='banco'?setInterval(doSync,15000):null;
    return()=>{ if(iv) clearInterval(iv); };
  },[screen,selPartner]);

  const showAlert=(msg,t='ok')=>{setAlert({msg,t});setTimeout(()=>setAlert(null),3000);};

  const doSync=async()=>{
    if(!selPartner) return;
    setSyncing(true);
    const d=await api({action:'getOrders',partner:selPartner.id}).catch(()=>({ok:false}));
    if(d.ok) setOrders(d.orders||[]);
    setSyncing(false);
  };

  const selectPartner=(p)=>{ setSelPartner(p); setPinInput(''); setPinErr(''); setScreen('pin'); };

  const confirmPin=()=>{
    if(!selPartner.pin||selPartner.pin==='0000'||pinInput===selPartner.pin){
      setScreen('banco');
    } else {
      setPinErr('PIN errato');
      setPinInput('');
    }
  };

  const addPin=(d)=>{
    if(d==='del'){ setPinInput(p=>p.slice(0,-1)); return; }
    const np=pinInput+d;
    setPinInput(np);
    if(np.length>=(selPartner.pin||'').length) {
      setTimeout(()=>{
        if(!selPartner.pin||selPartner.pin==='0000'||np===selPartner.pin){
          setScreen('banco');
        } else { setPinErr('PIN errato'); setPinInput(''); }
      },200);
    }
  };

  const deliver=async(orderId,itemIdx)=>{
    const d=await api({action:'deliverItem',orderId,itemIdx,partner:selPartner.id});
    if(d.ok){ showAlert('Consegnato ✓'); doSync(); }
    else showAlert('Errore','er');
  };

    h('div',{style:{marginBottom:'12px'}},h('img',{src:'data:image/png;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/4gHYSUNDX1BST0ZJTEUAAQEAAAHIAAAAAAQwAABtbnRyUkdCIFhZWiAH4AABAAEAAAAAAABhY3NwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQAA9tYAAQAAAADTLQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAlkZXNjAAAA8AAAACRyWFlaAAABFAAAABRnWFlaAAABKAAAABRiWFlaAAABPAAAABR3dHB0AAABUAAAABRyVFJDAAABZAAAAChnVFJDAAABZAAAAChiVFJDAAABZAAAAChjcHJ0AAABjAAAADxtbHVjAAAAAAAAAAEAAAAMZW5VUwAAAAgAAAAcAHMAUgBHAEJYWVogAAAAAAAAb6IAADj1AAADkFhZWiAAAAAAAABimQAAt4UAABjaWFlaIAAAAAAAACSgAAAPhAAAts9YWVogAAAAAAAA9tYAAQAAAADTLXBhcmEAAAAAAAQAAAACZmYAAPKnAAANWQAAE9AAAApbAAAAAAAAAABtbHVjAAAAAAAAAAEAAAAMZW5VUwAAACAAAAAcAEcAbwBvAGcAbABlACAASQBuAGMALgAgADIAMAAxADb/2wBDAAUDBAQEAwUEBAQFBQUGBwwIBwcHBw8LCwkMEQ8SEhEPERETFhwXExQaFRERGCEYGh0dHx8fExciJCIeJBweHx7/2wBDAQUFBQcGBw4ICA4eFBEUHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh7/wAARCAP1AyoDASIAAhEBAxEB/8QAHQABAQEBAAMBAQEAAAAAAAAAAAcGBQMECAIJAf/EAFQQAAECAwUDBQ4CBggEBQQDAAABAgMEBQYHETaycnSxEiExNXMIEyIzNEFRYXGBgpHBwhShFTJCRVKDGCNTYpKUotIWVNHwFyRDRFYlVZPhZKOz/8QAGwEBAAMBAQEBAAAAAAAAAAAAAAECBAMFBgf/xAA5EQEAAgEEAAQBCgQGAgMAAAAAAQIDBBExMgUSIUETBlFhcYGRobHB0RQiM1MVNEJS4fBy8SQlNf/aAAwDAQACEQMRAD8A+ywAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA       h('span',{className:'queue-count'},syncing?'Aggiornamento...':'Aggiornato ora · '+orders.length+' ordini'),
      pending.length>0&&h('span',{className:'queue-badge'},pending.length+' in coda')),
    alert&&h('div',{className:'al '+alert.t},alert.msg),
    h('div',{className:'tabs'},
      h('div',{className:'tab'+(tab==='queue'?' on':''),onClick:()=>setTab('queue')},'In coda ('+pending.length+')'),
      h('div',{className:'tab'+(tab==='done'?' on':''),onClick:()=>setTab('done')},'Consegnati ('+done.length+')'),
      h('div',{className:'tab'+(tab==='manual'?' on':''),onClick:()=>setTab('manual')},'Manuale')),
    tab==='queue'&&(pending.length===0
      ?h('div',{className:'empty'},'Nessun ordine in coda 🎉\nAggiornamento automatico ogni 15s')
      :pending.map(o=>h(OrderCard,{key:o.id,order:o,onDeliver:deliver}))),
    tab==='done'&&(done.length===0
      ?h('div',{className:'empty'},'Nessun ordine consegnato ancora.')
      :done.map(o=>h(OrderCard,{key:o.id,order:o,onDeliver:deliver}))),
    tab==='manual'&&h(ManualTab,{partnerId:selPartner.id,showAlert,onSaved:doSync}));
}

function OrderCard({order,onDeliver}){
  const pendingItems=order.items.filter(it=>!it.delivered);
  const doneItems=order.items.filter(it=>it.delivered);
  return h('div',{className:'order-card'+(pendingItems.length>0?' new':'')},
    h('div',{className:'oc-head'},
      h('div',null,
        h('div',{className:'oc-name'},order.customerName),
        h('div',{className:'oc-time'},order.timestamp)),
      h('div',{style:{display:'flex',alignItems:'center',gap:'8px'}},
        h('div',{className:'oc-code'},order.id),
        pendingItems.length>0?h('span',{className:'new-badge'},pendingItems.length+' da consegnare'):h('span',{className:'done-badge'},'✓ completo'))),
    h('div',{className:'oc-body'},
      [...pendingItems,...doneItems].map((it,i)=>h('div',{key:i,className:'oc-item'},
        h('div',{className:'oi-info'},
          h('div',{className:'oi-name'},it.name),
          h('div',{className:'oi-qty'},'×'+it.qty+(it.delivered?' · consegnato '+it.deliveredAt:''))),
        it.delivered
          ?h('div',{className:'deliver-btn done'},'✓')
          :h('button',{className:'deliver-btn',onClick:()=>onDeliver(it.orderId,it.itemIdx)},'Consegna')))));
}

function ManualTab({partnerId,showAlert,onSaved}){
  const[cfg,setCfg]=useState(null);
  const[sel,setSel]=useState('');
  const[qty,setQty]=useState(1);
  const[name,setName]=useState('');
  const[pay,setPay]=useState('contanti');
  const[saving,setSaving]=useState(false);

  useEffect(()=>{ api({action:'getConfig'}).then(d=>{ if(d.ok) setCfg(d.config); }); },[]);

  const myProducts=(cfg?cfg.products||[]:[]).filter(p=>p.partner===partnerId);

  const save=async()=>{
    if(!sel||!name||qty<1) return;
    setSaving(true);
    const prod=myProducts.find(p=>p.id===sel);
    const items=[{id:prod.id,name:prod.name,price:prod.price,qty,partner:partnerId}];
    const d=await api({action:'addManualOrder',name:encodeURIComponent(name),items:encodeURIComponent(JSON.stringify(items)),total:prod.price*qty,pay});
    setSaving(false);
    if(d.ok){ showAlert('Ordine manuale registrato ✓'); setSel(''); setQty(1); setName(''); onSaved(); }
    else showAlert('Errore','er');
  };

  return h('div',{className:'manual-box'},
    h('div',{className:'manual-title'},'Registra vendita manuale'),
    h('div',{style:{fontSize:'12px',color:'#666',marginBottom:'12px',lineHeight:'1.6'}},'Usa quando il cliente paga direttamente al tuo banco (token fisico o contanti senza passare dalla cassa).'),
    h('div',{className:'fld'},
      h('label',null,'Cliente'),
      h('input',{value:name,onChange:e=>setName(e.target.value),placeholder:'Nome cliente'})),
    h('div',{className:'fld'},
      h('label',null,'Prodotto'),
      h('select',{value:sel,onChange:e=>setSel(e.target.value)},
        h('option',{value:''},'Seleziona...'),
        myProducts.map(p=>h('option',{key:p.id,value:p.id},p.name+' — '+euro(p.price))))),
    h('div',{className:'fld'},
      h('label',null,'Quantità'),
      h('div',{className:'qty-ctrl'},
        h('div',{className:'qb',onClick:()=>setQty(q=>Math.max(1,q-1))},'−'),
        h('span',{className:'qn'},qty),
        h('div',{className:'qb',onClick:()=>setQty(q=>q+1)},'+'))),
    h('div',{className:'fld'},
      h('label',null,'Pagamento'),
      h('select',{value:pay,onChange:e=>setPay(e.target.value)},
        h('option',{value:'contanti'},'Contanti'),
        h('option',{value:'pos'},'POS'))),
    sel&&h('div',{style:{fontSize:'14px',fontWeight:'600',color:var_v(),marginBottom:'10px'}},'Totale: '+euro((myProducts.find(p=>p.id===sel)||{}).price*qty||0)),
    h('button',{style:{width:'100%',padding:'12px',background:'#7A9080',color:'#fff',border:'none',borderRadius:'8px',fontSize:'14px',fontWeight:'600',cursor:'pointer',opacity:(!sel||!name)?'.4':'1'},disabled:!sel||!name||saving,onClick:save},saving?'Salvataggio...':'Registra vendita'));
}

function var_v(){ return '#7A9080'; }
ReactDOM.render(h(App),document.getElementById('root'));
</script>
</body>
